name: python_runner
description: "Python运行器 - Android端Python脚本运行环境"
publish_to: 'none'

version: 1.3.1+5

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # 代码编辑器（语法高亮）
  flutter_code_editor: ^0.3.2
  highlight: ^0.7.0
  # 文件选择器
  file_picker: ^8.1.2
  # 本地配置存储
  shared_preferences: ^2.3.2
  # SQLite数据库
  sqflite: ^2.3.3+1
  path_provider: ^2.1.4
  path: ^1.9.0
  # 状态管理
  provider: ^6.1.2
  # UUID生成
  uuid: ^4.5.0
  # 时间格式化
  intl: ^0.20.2
  # 权限管理
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/python_hooks/
